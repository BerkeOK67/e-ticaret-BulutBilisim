<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Paneli - Nexus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">
        <div class="logo-icon">N</div>
        <div><div class="logo-text">Nexus</div><div class="logo-sub">Yönetim Paneli</div></div>
      </a>
      <div class="nav-actions">
        <div class="user-chip">
          <div class="user-av" id="admin-av">A</div>
          <span id="admin-name-nav">Admin</span>
        </div>
        <button class="btn-outline-sm" onclick="adminLogout()">Çıkış</button>
      </div>
    </div>
  </nav>

  <main style="padding: 40px 24px; max-width: 1280px; margin: 0 auto;">
    <div class="inner-header">
      <h2>Admin Paneli</h2>
      <button class="btn-primary" onclick="openProductModal()" id="admin-add-prod-btn">+ Ürün Ekle</button>
      <button class="btn-primary hidden" onclick="openAdminCreateModal()" id="admin-add-admin-btn">+ Yeni Admin</button>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchAdminTab(event,'tab-products')">Ürünler</button>
      <button class="tab" onclick="switchAdminTab(event,'tab-users')">Kullanıcılar</button>
    </div>
    
    <div id="tab-products" class="tab-panel">
      <div class="products-grid" id="admin-products-grid">
        <!-- Admin product cards -->
      </div>
    </div>
    
    <div id="tab-users" class="tab-panel hidden">
      <table class="data-table">
        <thead><tr><th>ID</th><th>Ad</th><th>E-posta</th><th>Rol</th><th>Kayıt</th><th>İşlemler</th></tr></thead>
        <tbody id="admin-users-body"></tbody>
      </table>
    </div>
  </main>

  <!-- ── PRODUCT MODAL ───────────────────────────────── -->
  <div class="overlay" id="prod-overlay" onclick="closeProductModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-x" onclick="closeProductModal()">✕</button>
      <h3 class="modal-title" id="prod-modal-title">Ürün Ekle</h3>
      <form id="prod-form" onsubmit="handleProductSave(event)">
        <input type="hidden" id="product-id" />
        <div class="field"><label>Ürün Adı</label><input type="text" id="prod-name" required /></div>
        <div class="field"><label>Açıklama</label><textarea id="prod-desc" rows="2" required></textarea></div>
        <div class="field-row">
          <div class="field"><label>Fiyat (₺)</label><input type="number" id="prod-price" step="0.01" required /></div>
          <div class="field"><label>Kategori</label>
            <select id="prod-category" required>
              <option value="Telefon">Telefon</option>
              <option value="Bilgisayar">Bilgisayar</option>
              <option value="Oyun">Oyun</option>
              <option value="Ses">Ses</option>
              <option value="Fotoğraf">Fotoğraf</option>
              <option value="TV">TV</option>
              <option value="Saat">Saat</option>
              <option value="Aksesuar">Aksesuar</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>Stok</label><input type="number" id="prod-stock" required /></div>
          <div class="field"><label>Vergi Oranı (%)</label><input type="number" id="prod-tax" value="18" required /></div>
        </div>
        <div class="field"><label>Görsel URL</label><input type="url" id="prod-image" placeholder="https://..." /></div>
        <div class="form-err hidden" id="prod-error"></div>
        <button type="submit" class="btn-primary btn-full" id="product-submit">Kaydet</button>
      </form>
    </div>
  </div>

  <!-- ── CREATE ADMIN MODAL ──────────────────────────── -->
  <div class="overlay" id="admin-create-overlay" onclick="closeAdminCreateModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-x" onclick="closeAdminCreateModal()">✕</button>
      <h3 class="modal-title">Yeni Admin Oluştur</h3>
      <form id="admin-create-form" onsubmit="handleCreateAdmin(event)">
        <div class="field"><label>Ad Soyad</label><input type="text" id="new-admin-name" required /></div>
        <div class="field"><label>E-posta</label><input type="email" id="new-admin-email" required /></div>
        <div class="field"><label>Şifre</label><input type="password" id="new-admin-password" required minlength="6" /></div>
        <div class="form-err hidden" id="admin-create-error"></div>
        <button type="submit" class="btn-primary btn-full" id="admin-create-submit">Oluştur</button>
      </form>
    </div>
  </div>

  <!-- ── TOASTS & ALERTS ───────────────────────────────────────── -->
  <div id="toasts"></div>
  <div class="overlay" id="confirm-overlay" style="z-index:9999;">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 class="modal-title" id="confirm-title">Emin misiniz?</h3>
      <p id="confirm-msg" style="margin-bottom:20px; color:var(--text-2);"></p>
      <div style="display:flex; gap:10px;">
        <button class="btn-outline-sm btn-full" id="confirm-no" style="padding:10px;">İptal</button>
        <button class="btn-primary btn-full" id="confirm-yes" style="padding:10px;">Onayla</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
